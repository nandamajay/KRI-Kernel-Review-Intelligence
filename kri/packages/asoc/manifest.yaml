# ASoC Domain Knowledge Package manifest (scaffolding).
# Schema: see kri/SPEC.md "DKP Manifest Schema". Filled out by the Knowledge Team (Sprint 2).
package:
  name: asoc
  version: 0.1.0
  description: ALSA System-on-Chip (ASoC) subsystem knowledge package.

schema:
  ekg_schema_version: "1.0"

# Kernel versions this DKP is validated against. valid_until null == HEAD.
kernel_version_range:
  valid_from: "6.1"
  valid_until: null

requires:
  - runtime: ">=0.1.0"

# Paths this domain owns. Generic Runtime routes files to DKPs via these patterns.
file_patterns:
  - "sound/soc/*"
  - "include/sound/soc*.h"
  - "include/sound/soc-*.h"
  - "Documentation/sound/soc/*"

# Sub-packages (Engineering Intelligence Packages doc): Core, Codec, Machine, Platform.
sub_packages:
  - core
  - codec
  - machine
  - platform

# Reasoning plugins. trigger := "file_touched:<glob>" | "api_used:<glob>".
# One plugin per seeded review pattern (see plugins.py::build_reasoning_plugins).
# layer in {structural, semantic, design} (MVP reasoning layers 1-3).
reasoning_plugins:
  - plugin_id: "asoc:asoc-reject-userspace-tdm-slot-enum"
    trigger: "file_touched:sound/soc/*"
    layer: design
  - plugin_id: "asoc:asoc-reject-resume-without-cleanup"
    trigger: "file_touched:sound/soc/*"
    layer: semantic
